<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重力轴旋转监测</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a; color: #e0e0e0;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px; overflow-x: hidden;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; color: #7eb8ff; text-align: center; }
  .subtitle { font-size: 0.72rem; color: #666; margin-bottom: 14px; text-align: center; }

  .controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
  .btn {
    border: none; padding: 12px 24px; border-radius: 12px; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; color: white; transition: transform 0.15s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-perm { background: linear-gradient(135deg, #4a90d9, #357abd); }
  .btn-reset { background: linear-gradient(135deg, #868e96, #495057); }

  .chart-section {
    width: 100%; max-width: 460px; margin-bottom: 14px;
  }
  .chart-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .chart-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .chart-title { font-size: 0.8rem; font-weight: 700; }
  .chart-value { margin-left: auto; font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }

  .chart-container {
    width: 100%; height: 200px;
    background: #0d0d24; border-radius: 14px; border: 1px solid #1e1e40;
    position: relative; overflow: hidden;
  }
  canvas { width: 100%; height: 100%; display: block; }

  .info-row {
    width: 100%; max-width: 460px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .info-card {
    background: #12122a; border-radius: 10px; padding: 10px;
    border: 1px solid #1e1e40; text-align: center;
  }
  .info-label { font-size: 0.6rem; color: #8888aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .info-value { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; color: #ccc; }
  .info-value.sm { font-size: 0.9rem; color: #999; }

  #status { font-size: 0.78rem; color: #888; text-align: center; margin-top: 4px; max-width: 460px; line-height: 1.4; }

  .cal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 100; padding: 30px;
  }
  .cal-overlay.hidden { display: none; }
  .cal-icon { font-size: 3rem; margin-bottom: 16px; }
  .cal-title { color: #fcc419; font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .cal-desc { color: #888; font-size: 0.9rem; text-align: center; line-height: 1.6; margin-bottom: 20px; max-width: 320px; }
  .cal-desc em { color: #fcc419; font-style: normal; font-weight: 600; }
  .cal-bar { width: 200px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
  .cal-fill { height: 100%; background: #fcc419; border-radius: 4px; transition: width 0.1s; width: 0%; }
  .cal-status { color: #aaa; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>🔄 重力轴旋转监测</h1>
<div class="subtitle">绕重力方向的旋转角度与角加速度</div>

<div class="controls">
  <button class="btn btn-perm" id="permBtn" onclick="requestPermission()">授权传感器</button>
  <button class="btn btn-reset" id="resetBtn" onclick="recalibrate()" style="display:none;">↻ 重新校准</button>
</div>

<!-- Chart 1: Yaw Angle -->
<div class="chart-section">
  <div class="chart-header">
    <div class="chart-dot" style="background:#7eb8ff;"></div>
    <div class="chart-title" style="color:#7eb8ff;">旋转角度 (°)</div>
    <div class="chart-value" style="color:#7eb8ff;" id="valAngle">0.0°</div>
  </div>
  <div class="chart-container">
    <canvas id="chartAngle"></canvas>
  </div>
</div>

<!-- Chart 2: Angular Acceleration -->
<div class="chart-section">
  <div class="chart-header">
    <div class="chart-dot" style="background:#ff6b6b;"></div>
    <div class="chart-title" style="color:#ff6b6b;">角加速度 (°/s²)</div>
    <div class="chart-value" style="color:#ff6b6b;" id="valAccel">0.0</div>
  </div>
  <div class="chart-container">
    <canvas id="chartAccel"></canvas>
  </div>
</div>

<div class="info-row">
  <div class="info-card">
    <div class="info-label">当前角速度 (°/s)</div>
    <div class="info-value" id="valRate">0.0</div>
  </div>
  <div class="info-card">
    <div class="info-label">峰值角速度</div>
    <div class="info-value sm" id="peakRate">0.0</div>
  </div>
  <div class="info-card">
    <div class="info-label">|g| 校验</div>
    <div class="info-value sm" id="gCheck">--</div>
  </div>
</div>

<div id="status">请点击「授权传感器」开始</div>

<!-- Calibration -->
<div class="cal-overlay hidden" id="calOverlay">
  <div class="cal-icon">📐</div>
  <div class="cal-title">重力方向校准</div>
  <div class="cal-desc">
    请将手机保持静止 3 秒。<br><br>
    任意姿态均可，只要不动就行。
  </div>
  <div class="cal-bar"><div class="cal-fill" id="calFill"></div></div>
  <div class="cal-status" id="calStatus">正在采集...</div>
</div>

<script>
// ============ CONFIG ============
const CAL_DURATION = 3000;
const CAL_MIN_SAMPLES = 50;
const SAMPLE_INTERVAL = 50; // 20fps
const CHART_SECONDS = 10;
const GRAV_LP = 0.97;

// ============ STATE ============
let permissionGranted = false;
let calibrated = false;
let calibrating = false;

let calStartTime = 0;
let calAccelSamples = [];

// Gravity unit vector in device frame
let gUnitX = 0, gUnitY = 0, gUnitZ = 1;

// Continuous gravity LP
let gravX = 0, gravY = 0, gravZ = 9.8;
let gravInited = false;

// Yaw tracking
let yawAngle = 0;         // integrated angle (°)
let yawRate = 0;           // current angular velocity (°/s)
let yawAccel = 0;          // angular acceleration (°/s²)
let prevYawRate = 0;       // for computing angular acceleration
let lastMotionTime = null;
let peakRate = 0;

// Chart data
let dataAngle = [];
let dataAccel = [];
let chartStartTime = 0;
let sampleTimer = null;

// Canvas
const cvAngle = document.getElementById('chartAngle');
const ctxAngle = cvAngle.getContext('2d');
const cvAccel = document.getElementById('chartAccel');
const ctxAccel = cvAccel.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  [cvAngle, cvAccel].forEach(cv => {
    const rect = cv.parentElement.getBoundingClientRect();
    cv.width = rect.width * dpr;
    cv.height = rect.height * dpr;
    cv.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  drawChart(ctxAngle, cvAngle, dataAngle, '#7eb8ff', '°');
  drawChart(ctxAccel, cvAccel, dataAccel, '#ff6b6b', '°/s²');
}
window.addEventListener('resize', resizeCanvas);

// ============ SENSOR ============
function handleMotion(e) {
  const now = performance.now();

  const agx = e.accelerationIncludingGravity?.x || 0;
  const agy = e.accelerationIncludingGravity?.y || 0;
  const agz = e.accelerationIncludingGravity?.z || 0;

  if (!gravInited) { gravX = agx; gravY = agy; gravZ = agz; gravInited = true; }
  else {
    gravX = GRAV_LP * gravX + (1 - GRAV_LP) * agx;
    gravY = GRAV_LP * gravY + (1 - GRAV_LP) * agy;
    gravZ = GRAV_LP * gravZ + (1 - GRAV_LP) * agz;
  }

  const gMag = Math.sqrt(gravX*gravX + gravY*gravY + gravZ*gravZ);
  document.getElementById('gCheck').textContent = gMag.toFixed(2);

  // Calibration
  if (calibrating) {
    calAccelSamples.push({ x: agx, y: agy, z: agz });
    const progress = Math.min((now - calStartTime) / CAL_DURATION * 100, 100);
    document.getElementById('calFill').style.width = progress + '%';
    document.getElementById('calStatus').textContent = `正在采集... ${calAccelSamples.length} 个样本`;
    if (now - calStartTime >= CAL_DURATION) finishCalibration();
    return;
  }

  if (!calibrated) return;

  // Gyro: project rotationRate onto gravity axis
  // iOS mapping: ω = (rr.alpha, rr.beta, rr.gamma) → device (X, Y, Z)
  const rr = e.rotationRate;
  if (!rr) return;

  const wx = rr.alpha || 0;
  const wy = rr.beta  || 0;
  const wz = rr.gamma || 0;

  // Yaw rate = ω · ĝ
  const rawYawRate = wx * gUnitX + wy * gUnitY + wz * gUnitZ;

  // Smooth yaw rate for display
  yawRate = yawRate * 0.7 + rawYawRate * 0.3;

  // Integrate angle
  if (lastMotionTime !== null) {
    const dt = (now - lastMotionTime) / 1000;
    if (dt > 0 && dt < 0.5) {
      yawAngle += rawYawRate * dt;

      // Angular acceleration = d(yawRate)/dt
      yawAccel = (rawYawRate - prevYawRate) / dt;
    }
  }
  lastMotionTime = now;
  prevYawRate = rawYawRate;

  // Peak
  if (Math.abs(yawRate) > peakRate) peakRate = Math.abs(yawRate);

  // Update display
  document.getElementById('valAngle').textContent = yawAngle.toFixed(1) + '°';
  document.getElementById('valAccel').textContent = yawAccel.toFixed(1);
  document.getElementById('valRate').textContent = yawRate.toFixed(1);
  document.getElementById('peakRate').textContent = peakRate.toFixed(1);
}

// ============ CHART ============
function startSampling() {
  chartStartTime = performance.now();
  dataAngle = []; dataAccel = [];
  sampleTimer = setInterval(() => {
    const t = (performance.now() - chartStartTime) / 1000;
    dataAngle.push({ t, v: yawAngle });
    // Smooth angular acceleration for chart
    const smoothAccel = yawAccel;
    dataAccel.push({ t, v: smoothAccel });
    const maxSamples = Math.ceil(CHART_SECONDS / (SAMPLE_INTERVAL / 1000)) + 20;
    if (dataAngle.length > maxSamples) dataAngle.shift();
    if (dataAccel.length > maxSamples) dataAccel.shift();
    drawChart(ctxAngle, cvAngle, dataAngle, '#7eb8ff', '°');
    drawChart(ctxAccel, cvAccel, dataAccel, '#ff6b6b', '°/s²');
  }, SAMPLE_INTERVAL);
}

function stopSampling() {
  if (sampleTimer) { clearInterval(sampleTimer); sampleTimer = null; }
}

function drawChart(ctx, canvas, data, color, unit) {
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const pad = { top: 14, right: 12, bottom: 26, left: 44 };
  const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  // Auto Y range
  let maxAbs = 5;
  for (const d of data) { const a = Math.abs(d.v); if (a > maxAbs) maxAbs = a; }
  const yRange = unit === '°'
    ? Math.max(10, Math.ceil(maxAbs / 10) * 10 + 5)
    : Math.max(5, Math.ceil(maxAbs / 5) * 5 + 5);

  const now = data.length > 0 ? data[data.length - 1].t : 0;
  const tMin = now - CHART_SECONDS, tMax = now;

  function xP(t) { return pad.left + ((t - tMin) / (tMax - tMin)) * cw; }
  function yP(v) { return pad.top + ch / 2 - (v / yRange) * (ch / 2); }

  // Background
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(pad.left, pad.top, cw, ch);

  // H grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  const yStep = yRange <= 10 ? 5 : yRange <= 30 ? 10 : yRange <= 90 ? 15 : yRange <= 180 ? 30 : 45;
  for (let a = -yRange; a <= yRange; a += yStep) {
    const y = yP(a); if (y < pad.top || y > pad.top + ch) continue;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
  }

  // Zero line
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  const zeroY = yP(0);
  ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + cw, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  // V grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  const tStep = CHART_SECONDS <= 5 ? 1 : CHART_SECONDS <= 15 ? 2 : 5;
  const firstT = Math.ceil(tMin / tStep) * tStep;
  for (let t = firstT; t <= tMax; t += tStep) {
    const x = xP(t); if (x < pad.left || x > pad.left + cw) continue;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = '#555'; ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let a = -yRange; a <= yRange; a += yStep) {
    const y = yP(a); if (y < pad.top + 5 || y > pad.top + ch - 5) continue;
    ctx.fillText(a.toFixed(0), pad.left - 5, y);
  }

  // X labels
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let t = firstT; t <= tMax; t += tStep) {
    const x = xP(t); if (x < pad.left + 10 || x > pad.left + cw - 10) continue;
    ctx.fillText(t.toFixed(0) + 's', x, pad.top + ch + 4);
  }

  // Axis labels
  ctx.fillStyle = '#444'; ctx.font = '8px -apple-system,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('时间 (秒)', pad.left + cw / 2, h - 2);
  ctx.save(); ctx.translate(8, pad.top + ch / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText(unit, 0, 0); ctx.restore();

  if (data.length < 2) return;

  // Clip
  ctx.save(); ctx.beginPath(); ctx.rect(pad.left, pad.top, cw, ch); ctx.clip();

  // Fill under curve
  ctx.beginPath();
  let started = false;
  for (const d of data) {
    if (d.t < tMin) continue;
    const x = xP(d.t), y = yP(d.v);
    if (!started) { ctx.moveTo(x, zeroY); ctx.lineTo(x, y); started = true; }
    else ctx.lineTo(x, y);
  }
  if (started) {
    ctx.lineTo(xP(data[data.length - 1].t), zeroY);
    ctx.closePath();
    // Parse color for fill
    ctx.fillStyle = color + '0f';
    ctx.fill();
  }

  // Line
  ctx.beginPath(); started = false;
  for (const d of data) {
    if (d.t < tMin) continue;
    const x = xP(d.t), y = yP(d.v);
    if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();

  // End dot with glow
  const last = data[data.length - 1];
  const lx = xP(last.t), ly = yP(last.v);
  const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, 10);
  glow.addColorStop(0, color + '66');
  glow.addColorStop(1, color + '00');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(lx, ly, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(lx, ly, 3.5, 0, Math.PI * 2); ctx.fill();

  // Value label at dot
  ctx.fillStyle = '#bbb'; ctx.font = 'bold 10px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(last.v.toFixed(1), lx + 8, ly - 4);

  ctx.restore();

  // Border
  ctx.strokeStyle = '#1e1e40'; ctx.lineWidth = 1;
  ctx.strokeRect(pad.left, pad.top, cw, ch);
}

// ============ CALIBRATION ============
function startCalibration() {
  calibrating = true;
  calStartTime = performance.now();
  calAccelSamples = [];
  document.getElementById('calOverlay').classList.remove('hidden');
  document.getElementById('calFill').style.width = '0%';
}

function finishCalibration() {
  calibrating = false;
  document.getElementById('calOverlay').classList.add('hidden');

  if (calAccelSamples.length < CAL_MIN_SAMPLES) {
    document.getElementById('status').textContent = '❌ 采样不足，请重试。';
    return;
  }

  let sx = 0, sy = 0, sz = 0;
  for (const s of calAccelSamples) { sx += s.x; sy += s.y; sz += s.z; }
  const n = calAccelSamples.length;
  const avgX = sx / n, avgY = sy / n, avgZ = sz / n;
  const mag = Math.sqrt(avgX*avgX + avgY*avgY + avgZ*avgZ);

  if (mag < 5) {
    document.getElementById('status').textContent = '❌ 重力值异常，请重试。';
    return;
  }

  gUnitX = avgX / mag;
  gUnitY = avgY / mag;
  gUnitZ = avgZ / mag;
  gravX = avgX; gravY = avgY; gravZ = avgZ;

  yawAngle = 0; yawRate = 0; yawAccel = 0;
  prevYawRate = 0; lastMotionTime = null; peakRate = 0;

  calibrated = true;
  document.getElementById('resetBtn').style.display = '';
  document.getElementById('status').textContent =
    `✅ 校准完成！ĝ=(${gUnitX.toFixed(2)}, ${gUnitY.toFixed(2)}, ${gUnitZ.toFixed(2)})。转动手机查看变化。`;

  startSampling();
}

function recalibrate() {
  stopSampling(); calibrated = false;
  yawAngle = 0; yawRate = 0; yawAccel = 0;
  prevYawRate = 0; lastMotionTime = null; peakRate = 0;
  dataAngle = []; dataAccel = [];
  document.getElementById('valAngle').textContent = '0.0°';
  document.getElementById('valAccel').textContent = '0.0';
  document.getElementById('valRate').textContent = '0.0';
  document.getElementById('peakRate').textContent = '0.0';
  drawChart(ctxAngle, cvAngle, dataAngle, '#7eb8ff', '°');
  drawChart(ctxAccel, cvAccel, dataAccel, '#ff6b6b', '°/s²');
  startCalibration();
}

// ============ PERMISSION ============
function requestPermission() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => {
        if (state === 'granted') onPermGranted();
        else document.getElementById('status').textContent = '❌ 传感器权限被拒绝';
      })
      .catch(err => { document.getElementById('status').textContent = '❌ ' + err.message; });
  } else { onPermGranted(); }
}

function onPermGranted() {
  permissionGranted = true;
  window.addEventListener('devicemotion', handleMotion, true);
  document.getElementById('permBtn').disabled = true;
  document.getElementById('permBtn').textContent = '✅ 已授权';
  startCalibration();
}

resizeCanvas();
</script>
</body>
</html>
